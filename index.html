<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meine GitHub Pages</title>

<style>
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --card-hover:#334155;
    --text:#f8fafc;
    --muted:#94a3b8;
    --accent:#38bdf8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(135deg,#0f172a,#111827);
    color:var(--text);
    min-height:100vh;
    padding:60px 30px;
}

header{
    text-align:center;
    margin-bottom:50px;
}

h1{
    font-size:3rem;
    margin-bottom:10px;
}

header p{
    color:var(--muted);
    font-size:1.1rem;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:24px;
    max-width:1400px;
    margin:auto;
}

.card{
    background:var(--card);
    border-radius:18px;
    padding:24px;
    display:flex;
    flex-direction:column;
    transition:.25s;
    border:1px solid rgba(255,255,255,.06);
    box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.card:hover{
    transform:translateY(-6px);
    background:var(--card-hover);
    border-color:var(--accent);
}

.card h2{
    font-size:1.3rem;
    margin-bottom:12px;
}

.card p{
    flex:1;
    color:var(--muted);
    line-height:1.5;
    margin-bottom:20px;
}

.tags{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.tag{
    background:#0f172a;
    color:var(--accent);
    padding:5px 10px;
    border-radius:999px;
    font-size:.8rem;
}

a.button{
    text-decoration:none;
    background:var(--accent);
    color:#0f172a;
    font-weight:600;
    text-align:center;
    padding:12px;
    border-radius:10px;
    transition:.2s;
}

a.button:hover{
    filter:brightness(1.1);
}

.loading{
    text-align:center;
    color:var(--muted);
    font-size:1.2rem;
}

footer{
    margin-top:60px;
    text-align:center;
    color:var(--muted);
}
</style>
</head>

<body>

<header>
    <h1>Meine Projekte</h1>
    <p>Alle öffentlichen GitHub Pages</p>
</header>

<div id="projects" class="grid">
    <div class="loading">Lade Projekte…</div>
</div>

<footer>
    Erstellt mit GitHub Pages
</footer>

<script>

const USER = "gehetzter";

async function loadRepos(){

    const container = document.getElementById("projects");

    try{

        const response = await fetch(
            `https://api.github.com/users/${USER}/repos?per_page=100&sort=updated`
        );

        const repos = await response.json();

        const pages = repos.filter(r => r.has_pages);

        if(pages.length===0){
            container.innerHTML="<div class='loading'>Keine GitHub Pages gefunden.</div>";
            return;
        }

        container.innerHTML="";

        pages.forEach(repo=>{

            const card=document.createElement("div");
            card.className="card";

            const lang = repo.language
                ? `<span class="tag">${repo.language}</span>`
                : "";

            const updated = new Date(repo.updated_at)
                .toLocaleDateString("de-DE");

            card.innerHTML=`
                <h2>${repo.name}</h2>

                <p>
                    ${repo.description || "Keine Beschreibung vorhanden."}
                </p>

                <div class="tags">
                    ${lang}
                    <span class="tag">⭐ ${repo.stargazers_count}</span>
                    <span class="tag">Aktualisiert ${updated}</span>
                </div>

                <a class="button"
                   href="https://${USER}.github.io/${repo.name}/"
                   target="_blank">
                   Projekt öffnen →
                </a>
            `;

            container.appendChild(card);

        });

    }catch(e){

        container.innerHTML="<div class='loading'>Fehler beim Laden.</div>";
        console.error(e);
    }
}

loadRepos();

</script>

</body>
</html>
